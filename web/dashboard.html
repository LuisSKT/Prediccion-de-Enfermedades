<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Médico - Predicciones</title>
    <link rel="stylesheet" href="estilo2.css">
</head>
<body>
    <div class="contenedor-dashboard">
        <h2>Bienvenido al Sistema de Predicción Médico</h2>
        
        <form id="formularioMedico">
            <div class="grupo">
                <label>Nivel de Glucosa (mg/dL):</label>
                <input type="number" id="glucosa" required>
            </div>
            <div class="grupo">
                <label>Edad del Paciente:</label>
                <input type="number" id="edad" required>
            </div>
            <div class="grupo">
                <label>Presión Arterial (mmHg):</label>
                <input type="number" id="presion" required>
            </div>

            <div class="botones">
                <button type="button" onclick="evaluar('arbol')">Diagnóstico Inicial (Árbol)</button>
                <button type="button" onclick="evaluar('xgboost')">Diagnóstico Mejorado (XGBoost)</button>
                <button type="button" onclick="window.print()" class="btn-imprimir">Imprimir a PDF / Excel</button>
            </div>
        </form>

        <div id="resultado" class="caja-resultado">
            Esperando datos del paciente...
        </div>
    </div>

    <script src="logica2.js"></script>
</body>
</html>
